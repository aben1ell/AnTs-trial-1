<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abenezer Tsion | Interactive</title>
    <style>
        /* Base Setup & Deep Black Theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* Fixed Navigation Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid #111111;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 1px;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        nav a:hover {
            color: #dddddd;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }

        /* Welcome Section (Placeholder for entry text) */
        .welcome-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .welcome-section h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 15px;
        }

        .welcome-section p {
            color: #666666;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* Interactive Robot Display Section */
        .robot-display {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 8%;
            background-color: #020202; /* Slight contrast to pitch black */
            position: relative;
        }

        /* Main Container for the Interactive Visual */
        .interactive-robot-container {
            width: 600px;
            height: 600px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Robot Body (Generated through CSS pseudo-elements to maintain performance) */
        .robot-body {
            position: absolute;
            bottom: 0;
            width: 500px;
            height: 400px;
            background: linear-gradient(135deg, #101010 0%, #050505 100%);
            border-radius: 60px 60px 20px 20px;
            box-shadow: inset 0px 0px 25px rgba(0, 0, 0, 0.9), 0px 15px 35px rgba(0, 0, 0, 0.7);
            border: 1px solid #1c1c1c;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 50px;
        }

        /* Robot Head (The element with the interactivity script) */
        .interactive-head {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 170px;
            background: linear-gradient(145deg, #121212, #0a0a0a);
            border-radius: 55px 55px 65px 65px;
            border: 1px solid #1c1c1c;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0px 0px 25px rgba(0, 0, 0, 0.9);
            z-index: 10;
        }

        /* The Visor from your referenced image */
        .cyber-visor {
            width: 95px;
            height: 28px;
            background: #030303;
            border-radius: 14px;
            border: 1px solid #141414;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            box-shadow: inset 0px 3px 6px rgba(0, 0, 0, 0.9);
        }

        /* Robot Eyes / Interactive Cores */
        .eye-core {
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 14px 4px rgba(255, 255, 255, 1);
            position: relative;
        }

        /* Responsive design adjustments for mobile screens */
        @media (max-width: 768px) {
            .welcome-section h1 {
                font-size: 2rem;
            }
            .welcome-section p {
                font-size: 0.9rem;
            }
            .interactive-robot-container {
                width: 350px;
                height: 350px;
            }
            .robot-body {
                width: 300px;
                height: 250px;
            }
            .interactive-head {
                width: 110px;
                height: 130px;
            }
            .cyber-visor {
                width: 70px;
                height: 22px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Abenezer Tsion</div>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="welcome-section">
        <h1>WELCOME TO THE VOID</h1>
        <p>Scroll down to explore the creation.</p>
    </section>

    <section id="about" class="robot-display">
        
        <div class="interactive-robot-container">
            
            <div id="robotHead" class="interactive-head">
                <div class="cyber-visor">
                    <div class="eye-core"></div>
                    <div class="eye-core"></div>
                </div>
            </div>

            <div class="robot-body">
                </div>

        </div>

    </section>

</body>
</html>
